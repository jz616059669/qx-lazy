# Quantumult X 懒人配置包 (最终版)
# 基于官方模板 + 墨鱼配置 + 可用规则源 + 自动优选 + 去广告 + 智能分流
# 更新时间：2026-06-23 (v14 - 清理空段+统一interval+规则源兜底)
# 要求: Quantumult X >= 1.6.0 (支持AnyTLS协议)
# 参考：KOP-XIAO/QuantumultX + ddgksf2013 + w37fhy/QuantumultX

[general]
# 节点延迟测试
server_check_url=http://www.gstatic.com/generate_204
server_check_timeout=3000
# 资源解析器
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
# 节点IP检查（disabled=关闭，减少请求提高稳定性）
geo_location_checker=disabled
# 排除路由
excluded_routes=239.255.255.250/32, 24.105.30.129/32, 185.60.112.157/32, 185.60.112.158/32, 182.162.132.1/32
# DNS排除（这些域名不走代理，避免国内App出问题）
dns_exclusion_list=*.10099.com.cn, *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn
# WiFi智能切换（取消注释并修改WiFi名即可启用）
# 第一个filter=4G走规则分流，第二个filter=WiFi走规则分流
# 第三个=你家WiFi名:直连，第四个=公司WiFi名:直连
#running_mode_trigger=filter, filter, 你家WiFi名:all_direct, 公司WiFi名:all_direct
# UDP 设置
udp_drop_list=443, STUN, QUIC
# UDP 回退策略
fallback_udp_policy=direct

[dns]
# 加密DNS（DoH）- 避免DNS污染，防止DNS泄露
doh-server=https://dns.alidns.com/dns-query, https://doh.pub/dns-query, https://cloudflare-dns.com/dns-query, https://dns.google.com/dns-query
no-system

[task_local]
# 流媒体解锁查询（UI 交互脚本）
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/streaming-ui-check.js, tag=流媒体解锁查询, img-url=arrowtriangle.right.square.system, enabled=true
# 节点纯净度查询
event-interaction https://ddgksf2013.top/scripts/server-info-pure.js, tag=节点纯净度详情, img-url=checkmark.shield.fill.system
# Netflix 解锁查询
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/nf-ui-check.js, tag=Netflix解锁查询, img-url=checkmark.seal.system, enabled=true
# YouTube 解锁查询
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/ytb-ui-check.js, tag=YouTube解锁查询, img-url=checkmark.seal.system, enabled=true
# Disney+ 解锁查询
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/disney-ui-check.js, tag=Disney+解锁查询, img-url=checkmark.seal.system, enabled=true
# IP 信息查询
event-interaction https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IPCheck.js, tag=IP信息查询, img-url=globe.system, enabled=true
# WiFi 直连切换（根据网络自动切换策略）
event-network https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/network-direct.js, tag=WiFi直连切换, img-url=switch.2.system, enabled=true

[policy]
# ========== 自动优选（每10分钟测速，延迟差>20ms才切换，避免频繁跳节点）==========
url-latency-benchmark=🚀 自动选择, server-tag-regex=.*, check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png

# ========== 按地区分组（手动选择特定地区节点）==========
url-latency-benchmark=🇭🇰 香港节点, server-tag-regex=(?=.*(港|HK|(?i)Hong))^((?!(台|日|韩|新|美|德|英|加|澳)).)*$, check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png
url-latency-benchmark=🇹🇼 台湾节点, server-tag-regex=(?=.*(台|TW|(?i)Taiwan))^((?!(港|日|韩|新|美|德|英|加|澳)).)*$, check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png
url-latency-benchmark=🇯🇵 日本节点, server-tag-regex=(?=.*(日|JP|(?i)Japan))^((?!(港|台|韩|新|美|德|英|加|澳)).)*$, check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png
url-latency-benchmark=🇰🇷 韩国节点, server-tag-regex=(?=.*(韩|KR|Korea|首尔))^((?!(港|台|日|新|美|德|英|加|澳)).)*$, check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/KR.png
url-latency-benchmark=🇸🇬 新加坡节点, server-tag-regex=(?=.*(新|狮|SG|(?i)Singapore))^((?!(港|台|日|韩|美|德|英|加|澳)).)*$, check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/SG.png
url-latency-benchmark=🇺🇸 美国节点, server-tag-regex=(?=.*(美|US|(?i)States|American|亚特兰大|凤凰城))^((?!(港|台|日|韩|新|德|英|加|澳)).)*$, check-interval=600, tolerance=30, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png
url-latency-benchmark=🇬🇧 英国节点, server-tag-regex=(?=.*(英|UK|(?i)Britain|London))^((?!(港|台|日|韩|新|美|德|加|澳)).)*$, check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/UK.png
url-latency-benchmark=🇩🇪 德国节点, server-tag-regex=(?=.*(德|DE|(?i)Germany))^((?!(港|台|日|韩|新|美|英|加|澳)).)*$, check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/DE.png
url-latency-benchmark=🇨🇦 加拿大节点, server-tag-regex=(?=.*(加|CA|(?i)Canada|加拿大))^((?!(港|台|日|韩|新|美|德|英|澳)).)*$, check-interval=600, tolerance=20, img-url=https://raw.githubusercontent.com/Orz-3/mini/master/Color/CA.png

# ========== Netflix专用（匹配解锁NF的节点）==========
url-latency-benchmark=🎬 Netflix, server-tag-regex=(nf|解锁NF|NF|奈|Netflix), check-interval=600, tolerance=100, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Netflix_Letter.png


# ========== 按用途分组（自动选择最优地区）==========
static=🍎 苹果服务, direct, 🇭🇰 香港节点, 🇹🇼 台湾节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点, 🇺🇸 美国节点, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png
static=📺 Netflix, 🎬 Netflix, 🇹🇼 台湾节点, 🇯🇵 日本节点, 🇭🇰 香港节点, 🇸🇬 新加坡节点, 🇺🇸 美国节点, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Netflix_Letter.png
static=🎬 YouTube, 🇹🇼 台湾节点, 🇯🇵 日本节点, 🇭🇰 香港节点, 🇸🇬 新加坡节点, 🇺🇸 美国节点, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/YouTube.png
static=🎵 Spotify, 🇺🇸 美国节点, 🇹🇼 台湾节点, 🇯🇵 日本节点, 🇭🇰 香港节点, 🇸🇬 新加坡节点, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Spotify.png
static=🤖 AI服务, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇹🇼 台湾节点, 🇸🇬 新加坡节点, 🇭🇰 香港节点, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/ChatGPT.png
static=💬 Telegram, 🚀 自动选择, 🇭🇰 香港节点, 🇹🇼 台湾节点, 🇯🇵 日本节点, 🇸🇬 新加坡节点, 🇺🇸 美国节点, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Telegram.png
static=🕹 终极清单, 🚀 自动选择, 🌏 国外网站, direct, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png

